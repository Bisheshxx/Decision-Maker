name: Build and Deploy .NET App to Azure

# Only run this when code is pushed to the "prod" branch
on:
  push:
    branches:
      - prod

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      # 1. Pull the code from your repo
      - name: Checkout Code
        uses: actions/checkout@v4

      # 2. Set up the .NET environment
      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x' # Change to '6.0.x' or '9.0.x' if needed

      # 3. Build and "Publish" (this creates the binaries Azure needs)
      - name: .NET Restore and Build
        run: |
          dotnet restore
          dotnet build --configuration Release
          dotnet publish -c Release -o ./publish-folder

      # 4. Log in to Azure using the Service Principal secret you created
      - name: Login to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      # 5. Deploy the published files to your Web App
      - name: Deploy to Azure Web App
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'decisionmaker-api'
          package: ./publish-folder
